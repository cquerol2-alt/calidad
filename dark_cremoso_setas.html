<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arroz Cremoso Setas - Diagrama de Flujo de Producción</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #94a3b8;
        }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .diagram-wrapper {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
        }

        svg {
            display: block;
            margin: 0 auto;
            min-width: 100%;
        }

        .panel {
            width: 300px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 16px;
            max-height: 750px;
            overflow-y: auto;
        }

        .panel.vis {
            display: flex;
        }

        .panel-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .panel-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            font-weight: 600;
        }

        .panel-content {
            font-size: 13px;
            line-height: 1.5;
            color: #cbd5e1;
        }

        .panel-content br { display: block; margin: 4px 0; }

        .tags {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            width: fit-content;
        }

        .t-v { background: #3b82f6; color: #dbeafe; }
        .t-a { background: #ef4444; color: #fee2e2; }
        .t-c { background: #06b6d4; color: #cffafe; }

        .node {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .node:hover {
            filter: brightness(1.1);
        }

        .node.hl {
            filter: drop-shadow(0 0 8px currentColor);
        }

        .node.dim {
            opacity: 0.3;
        }

        .node.dim .glow {
            box-shadow: none !important;
        }

        .glow {
            transition: box-shadow 0.2s ease;
        }

        /* Node Styles */
        .n-mp { background: #1e40af; border: 2px solid #3b82f6; color: #dbeafe; }
        .n-mp .glow { box-shadow: 0 0 15px rgba(59,130,246,.5); }

        .n-pre { background: #059669; border: 2px solid #10b981; color: #d1fae5; }
        .n-pre .glow { box-shadow: 0 0 15px rgba(16,185,129,.5); }

        .n-mix { background: #7c3aed; border: 2px solid #a78bfa; color: #ede9fe; }
        .n-mix .glow { box-shadow: 0 0 15px rgba(167,139,250,.5); }

        .n-cal { background: #dc2626; border: 2px solid #ef4444; color: #fee2e2; }
        .n-cal .glow { box-shadow: 0 0 15px rgba(239,68,68,.5); }

        .n-sal { background: #581c87; border: 2px solid #a855f7; color: #d8b4fe; }
        .n-sal .glow { box-shadow: 0 0 15px rgba(168,85,247,.5); }

        .n-prod { background: #ea580c; border: 2px solid #fb923c; color: #fed7aa; }
        .n-prod .glow { box-shadow: 0 0 15px rgba(251,146,60,.5); }

        /* Line Styles */
        .ln {
            transition: all 0.2s ease;
            stroke-width: 2;
        }

        .lm { stroke: #3b82f6; opacity: 0.3; }
        .lp { stroke: #10b981; opacity: 0.3; }
        .lx { stroke: #a78bfa; opacity: 0.3; }
        .lc { stroke: #ef4444; opacity: 0.3; }
        .ls { stroke: #a855f7; opacity: 0.3; }
        .le { stroke: #fb923c; opacity: 0.3; }

        .ln.hl { opacity: 1; stroke-width: 3; }
        .ln.dim { opacity: 0.1; }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }

            .panel {
                width: 100%;
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .diagram-wrapper {
                padding: 10px;
            }
        }

        .back{position:fixed;top:15px;left:15px;background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;z-index:99}.back:hover{color:#f1f5f9;border-color:#64748b}
    </style>
</head>

        const ns=document.querySelectorAll('.node[id]:not([style*="display:none"])'),ls=document.querySelectorAll('.ln'),P=document.getElementById('P');
        let sel=null;
        ns.forEach(n=>{n.addEventListener('click',e=>{e.stopPropagation();const id=n.id;if(sel===id){clr();return}sel=id;
        const c=new Set([id]);ls.forEach(l=>{if(l.dataset.f===id||l.dataset.t===id){c.add(l.dataset.f);c.add(l.dataset.t)}});
        ns.forEach(x=>{x.classList.toggle('hl',c.has(x.id));x.classList.toggle('dim',!c.has(x.id))});
        ls.forEach(l=>{const ok=l.dataset.f===id||l.dataset.t===id;l.classList.toggle('hl',ok);l.classList.toggle('dim',!ok)});
        document.getElementById('pN').textContent=n.dataset.n;document.getElementById('pC').textContent=n.dataset.c;
        document.getElementById('pI').innerHTML=n.dataset.i.split('|').join('<br>');
        let t='';if(n.dataset.v)t+=`<span class="tag t-v">⏱ ${n.dataset.v}</span> `;
        if(n.dataset.a)t+=`<span class="tag t-a">⚠ ${n.dataset.a}</span> `;
        if(n.dataset.s)t+=`<span class="tag t-c">❄ ${n.dataset.s}</span> `;
        document.getElementById('pT').innerHTML=t;P.classList.add('vis')})});
        document.addEventListener('click',clr);
        function clr(){sel=null;ns.forEach(n=>{n.classList.remove('hl','dim')});ls.forEach(l=>{l.classList.remove('hl','dim')});P.classList.remove('vis')}
    </script>
</body>
</html>
