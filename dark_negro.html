<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arroz Negro — Flujo Producción</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:30px 20px}
h1{text-align:center;font-size:22px;color:#f1f5f9;margin-bottom:2px}
.sub{text-align:center;color:#64748b;font-size:13px;margin-bottom:10px}
.inst{text-align:center;color:#94a3b8;font-size:12px;margin-bottom:25px;background:#1e293b;padding:8px 16px;border-radius:8px;display:inline-block;margin-left:50%;transform:translateX(-50%)}
.inst span{color:#fbbf24}
.graph{max-width:1100px;margin:0 auto;position:relative;height:780px}
.n-pkg{background:#1a3636;border:1.5px solid #14b8a6;color:#5eead4}
.n-pkg .glow{box-shadow:0 0 15px rgba(20,184,166,.5)}
.node{position:absolute;border-radius:10px;padding:9px 12px;font-size:12.5px;cursor:pointer;transition:all .3s;text-align:center;line-height:1.3;user-select:none}
.node.hl{z-index:20}.node.dim{opacity:.15!important}
.node .glow{position:absolute;inset:-3px;border-radius:12px;opacity:0;transition:opacity .3s}
.node.hl .glow{opacity:1}
.n-mp{background:#1e3a5f;border:1.5px solid #3b82f6;color:#93c5fd}
.n-mp .glow{box-shadow:0 0 15px rgba(59,130,246,.5)}
.n-pre{background:#2d1b69;border:1.5px solid #8b5cf6;color:#c4b5fd}
.n-pre .glow{box-shadow:0 0 15px rgba(139,92,246,.5)}
.n-mix{background:#4c1d1d;border:2px solid #ef4444;color:#fca5a5}
.n-mix .glow{box-shadow:0 0 15px rgba(239,68,68,.5)}
.n-cal{background:#14532d;border:2px solid #22c55e;color:#86efac}
.n-cal .glow{box-shadow:0 0 15px rgba(34,197,94,.5)}
.n-prod{background:#78350f;border:2.5px solid #f59e0b;color:#fde68a;font-weight:700;font-size:18px}
.n-prod .glow{box-shadow:0 0 20px rgba(245,158,11,.6)}
.panel{position:fixed;right:20px;top:50%;transform:translateY(-50%);width:280px;background:#1e293b;border:1px solid #334155;border-radius:12px;padding:18px;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:all .3s;opacity:0;pointer-events:none;z-index:50}
.panel.vis{opacity:1;pointer-events:auto}
.panel h3{font-size:15px;color:#f1f5f9;margin-bottom:4px}
.panel .code{font-size:11px;color:#fbbf24;margin-bottom:10px}
.panel .info{font-size:12px;line-height:1.7;color:#94a3b8}
.panel .tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin:2px 2px 0 0}
.t-v{background:#14532d;color:#86efac}.t-a{background:#4c1d1d;color:#fca5a5}.t-c{background:#1e3a5f;color:#93c5fd}
.panel .x{position:absolute;top:8px;right:12px;cursor:pointer;color:#64748b;font-size:18px}.panel .x:hover{color:#f1f5f9}
svg.L{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.ln{fill:none;stroke-width:1.5;transition:opacity .3s}.ln.dim{opacity:.03!important}.ln.hl{opacity:1!important;stroke-width:2.5}
.lb{stroke:#3b82f6;opacity:.25}.lp{stroke:#8b5cf6;opacity:.25}.lr{stroke:#ef4444;opacity:.3}.lg{stroke:#22c55e;opacity:.35}.lo{stroke:#f59e0b;opacity:.4}.ld{stroke-dasharray:6 4}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.8}}.ln.hl{animation:pulse 1.5s ease-in-out infinite}
.legend{max-width:1100px;margin:20px auto 0;display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#64748b}
.legend-i{display:flex;align-items:center;gap:5px}.legend-d{width:12px;height:12px;border-radius:3px}
.back{position:fixed;top:15px;left:15px;background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;z-index:99}.back:hover{color:#f1f5f9;border-color:#64748b}
</style>
</head>
<body>
<a href="diagramas.html" class="back">← Atrás</a>
<h1>Arroz Negro</h1>
<p class="sub">Rice in Action S.L. — Flujo completo de materias primas y productos intermedios</p>
<p class="inst">Click en cualquier nodo para ver detalles • <span>Leyenda de colores abajo</span></p>

<div class="graph">
<svg class="L"></svg>

<!-- MP Nodes (left column) -->
<div class="node n-mp" id="MP04" style="left:20px;top:20px" data-n="Aceite girasol" data-c="MP04 — Coreysa" data-i="Para aceite de ajo" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP40" style="left:20px;top:80px" data-n="Ajo" data-c="MP40 — Ajopel" data-i="Para aceite de ajo" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP" style="left:20px;top:140px" data-n="Agua" data-c="MP — Grifo" data-i="Mezcla Jarra + Caldo" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP09" style="left:20px;top:200px" data-n="Hazelnut" data-c="MP09 — Sensient" data-i="Para mezcla jarra" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP35" style="left:20px;top:260px" data-n="Pollo deshidratado" data-c="MP35 — Ugeave" data-i="1800g para jarra" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP33" style="left:20px;top:320px" data-n="Espinaca deshidratada" data-c="MP33 — La Margarita" data-i="490g para jarra" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP01" style="left:20px;top:380px" data-n="Caldo Aneto" data-c="MP01 — Aneto" data-i="13.5L para caldo" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP08" style="left:20px;top:440px" data-n="Tinta de calamar" data-c="MP08 — Nortindal" data-i="1400g para caldo" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP06" style="left:20px;top:500px" data-n="Umami" data-c="MP06 — Givaudan" data-i="120g para caldo" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP07" style="left:20px;top:560px" data-n="Xantana" data-c="MP07 — Corquimia" data-i="10g para caldo" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP37" style="left:20px;top:620px" data-n="Sal" data-c="MP37 — Salrera" data-i="Para producto final" data-v="" data-a="" data-s=""></div>
<div class="node n-mp" id="MP24" style="left:20px;top:680px" data-n="Arroz Maratelli" data-c="MP24 — Arrocera del Pirineo" data-i="Para producto final" data-v="" data-a="" data-s=""></div>

<!-- Preelaborations (middle column) -->
<div class="node n-pre" id="PRELAB-AJO" style="left:220px;top:40px" data-n="Aceite de Ajo" data-c="PRELAB-AJO · RIA-PRELAB-AJO-DDMMAA" data-i="Aceite girasol + Ajo | Rend. control" data-v="" data-a="" data-s=""></div>
<div class="node n-pre" id="MEZCLA-JNORMAL" style="left:220px;top:200px" data-n="Mezcla Jarra Normal" data-c="MEZCLA-JNORMAL · RIA-MEZCLA-JNORMAL-DDMMAA" data-i="Hazelnut 260ml + Agua 3600ml" data-v="" data-a="" data-s=""></div>
<div class="node n-pre" id="JARRA-PESC" style="left:220px;top:280px" data-n="Jarra Pescado" data-c="JARRA-PESC · RIA-JARRA-PESC-DDMMAA" data-i="Pollo deshid 1800g|Espinaca deshid 490g" data-v="" data-a="" data-s=""></div>

<!-- Caldo (right-center) -->
<div class="node n-cal" id="REC-CALDO-002" style="left:480px;top:280px" data-n="Caldo Negro" data-c="REC-CALDO-002 · RIA-NEGRO" data-i="Caldo Aneto 13.5L|Agua 5.5L|Aceite girasol 5L|Aceite de Ajo 800ml|Umami 120g|Xantana 10g|Tinta calamar 1400g|Rendimiento: 25L" data-v="" data-a="" data-s=""></div>

<!-- Product (far right) -->
<div class="node n-prod" id="PROD-740" style="left:740px;top:320px;width:120px;height:80px" data-n="ARROZ NEGRO" data-c="La Santa · Código 740" data-i="Arroz|Agua|Caldo Negro|Mezcla Jarra Normal|Jarra Pescado|Sal|Formatos" data-v="" data-a="" data-s=""></div>

</div>

<!-- Links SVG -->
<svg class="L" id="svg"></svg>

<!-- Panel -->
<div id="P" class="panel">
<div class="x">✕</div>
<h3 id="pN"></h3>
<div class="code" id="pC"></div>
<div class="info" id="pI"></div>
<div id="pT"></div>
</div>

<!-- Legend -->
<div class="legend">
<div class="legend-i"><div class="legend-d" style="background:#1e3a5f;border:1.5px solid #3b82f6"></div> <span>MP (Materia Prima)</span></div>
<div class="legend-i"><div class="legend-d" style="background:#2d1b69;border:1.5px solid #8b5cf6"></div> <span>Preelaboración</span></div>
<div class="legend-i"><div class="legend-d" style="background:#14532d;border:2px solid #22c55e"></div> <span>Caldo</span></div>
<div class="legend-i"><div class="legend-d" style="background:#78350f;border:2.5px solid #f59e0b"></div> <span>Producto Final</span></div>
</div>

<script>
const ns=document.querySelectorAll('.node'),ls=document.querySelectorAll('.ln'),P=document.getElementById('P');
let sel=null;
ns.forEach(n=>{n.addEventListener('click',e=>{e.stopPropagation();const id=n.id;if(sel===id){clr();return}sel=id;
const c=new Set([id]);ls.forEach(l=>{if(l.dataset.f===id||l.dataset.t===id){c.add(l.dataset.f);c.add(l.dataset.t)}});
ns.forEach(x=>{x.classList.toggle('hl',c.has(x.id));x.classList.toggle('dim',!c.has(x.id))});
ls.forEach(l=>{const ok=l.dataset.f===id||l.dataset.t===id;l.classList.toggle('hl',ok);l.classList.toggle('dim',!ok)});
document.getElementById('pN').textContent=n.dataset.n;document.getElementById('pC').textContent=n.dataset.c;
document.getElementById('pI').innerHTML=n.dataset.i.split('|').join('<br>');
let t='';if(n.dataset.v)t+=`<span class="tag t-v">⏱ ${n.dataset.v}</span> `;
if(n.dataset.a)t+=`<span class="tag t-a">⚠ ${n.dataset.a}</span> `;
if(n.dataset.s)t+=`<span class="tag t-c">❄ ${n.dataset.s}</span> `;
document.getElementById('pT').innerHTML=t;P.classList.add('vis')})});
document.addEventListener('click',clr);
function clr(){sel=null;ns.forEach(n=>{n.classList.remove('hl','dim')});ls.forEach(l=>{l.classList.remove('hl','dim')});P.classList.remove('vis')}
</script>

</body>
</html>
