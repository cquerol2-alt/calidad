<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="800" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
<rect width="400" height="800" fill="white" stroke="#333" stroke-width="2" rx="8"/>
<text x="200" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="black">
  Caldo de Pescado
</text>
<text x="15" y="80" font-size="8" font-weight="bold" fill="#333">INGREDIENTES:</text>
<text x="15" y="92" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">Aceite rojo de nora (aceite de girasol alto</tspan>
</text>
<text x="15" y="102" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">oleico, nora, pimenton, curcuma), aceite de</tspan>
</text>
<text x="15" y="112" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">ajo (aceite de girasol alto oleico, ajo),</tspan>
</text>
<text x="15" y="122" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">caldo de pescado (agua, </tspan><tspan font-weight="bold" fill="#c00">PESCADO</tspan><tspan fill="black">, aceite</tspan>
</text>
<text x="15" y="132" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">de oliva virgen extra, sal, </tspan><tspan font-weight="bold" fill="#c00">APIO</tspan><tspan fill="black">,</tspan>
</text>
<text x="15" y="142" font-size="7" fill="black" font-family="monospace">
<tspan font-weight="bold" fill="#c00">CRUSTACEOS</tspan><tspan fill="black">, </tspan><tspan font-weight="bold" fill="#c00">MOLUSCOS</tspan><tspan fill="black">), potenciador de</tspan>
</text>
<text x="15" y="152" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">sabor umami, goma xantana (E415), agua de</tspan>
</text>
<text x="15" y="162" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">azafran (agua, azafran)</tspan>
</text>
<text x="15" y="182" font-size="8" font-weight="bold" fill="#333">CONSERVACIÓN:</text>
<text x="15" y="192" font-size="7" fill="black">Refrigeracion (0-4C)</text>
<text x="15" y="207" font-size="9" font-weight="bold" fill="black">
  LOTE: RIA-PESCADO-DDMMAA
</text>
<text x="15" y="223" font-size="8" fill="black">ELAB: __/__/____</text>
<text x="15" y="235" font-size="8" fill="black">CAD: __/__/____</text>
</svg>