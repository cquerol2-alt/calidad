<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="800" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
<rect width="400" height="800" fill="white" stroke="#333" stroke-width="2" rx="8"/>
<text x="200" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="black">
  Caldo de Pescado
</text>
<text x="15" y="80" font-size="8" font-weight="bold" fill="#333">INGREDIENTES:</text>
<text x="15" y="92" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">Aceite de ñora (aceite de girasol alto oleico,</tspan>
</text>
<text x="15" y="102" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">ñora, pimenton, curcuma), aceite de ajo</tspan>
</text>
<text x="15" y="112" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">(aceite de girasol alto oleico, ajo), caldo</tspan>
</text>
<text x="15" y="122" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">Aneto (agua, </tspan><tspan font-weight="bold" fill="#c00">PESCADO</tspan><tspan fill="black">, aceite de oliva</tspan>
</text>
<text x="15" y="132" font-size="7" fill="black" font-family="monospace">
<tspan fill="black">virgen extra, sal, </tspan><tspan font-weight="bold" fill="#c00">APIO</tspan><tspan fill="black">, </tspan><tspan font-weight="bold" fill="#c00">CRUSTACEOS</tspan><tspan fill="black">,</tspan>
</text>
<text x="15" y="142" font-size="7" fill="black" font-family="monospace">
<tspan font-weight="bold" fill="#c00">MOLUSCOS</tspan><tspan fill="black">), potenciador de sabor umami,</tspan>
