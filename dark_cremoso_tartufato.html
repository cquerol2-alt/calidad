<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arroz Cremoso Tartufato - Diagrama de Flujo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #f1f5f9;
    }
    .header {
      margin-bottom: 30px;
    }
    .code {
      font-family: 'Monaco', 'Courier New', monospace;
      color: #cbd5e1;
      font-size: 14px;
    }
    svg {
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
      display: block;
      margin: 20px 0;
      width: 100%;
      height: auto;
    }
    .node {
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .node:hover {
      filter: brightness(1.2);
    }
    .node.hl {
      filter: brightness(1.3);
    }
    .node.dim {
      opacity: 0.3;
    }
    .node.dim .glow {
      opacity: 0;
    }
    .glow {
      transition: box-shadow 0.2s ease;
    }
    .n-mp {
      background: #0ea5e9;
      border: 2px solid #06b6d4;
      color: #cffafe;
    }
    .n-mp .glow {
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
    }
    .n-rec {
      background: #8b5cf6;
      border: 2px solid #a78bfa;
      color: #ddd6fe;
    }
    .n-rec .glow {
      box-shadow: 0 0 15px rgba(167, 139, 250, 0.5);
    }
    .n-sal {
      background: #581c87;
      border: 2px solid #a855f7;
      color: #d8b4fe;
    }
    .n-sal .glow {
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
    }
    .n-prod {
      background: #059669;
      border: 2px solid #10b981;
      color: #d1fae5;
    }
    .n-prod .glow {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
    }
    .n-pkg {
      background: #dc2626;
      border: 2px solid #ef4444;
      color: #fee2e2;
    }
    .n-pkg .glow {
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
    }
    .ln {
      stroke: #475569;
      stroke-width: 2;
      fill: none;
      transition: all 0.2s ease;
    }
    .ln.hl {
      stroke: #60a5fa;
      stroke-width: 3;
      opacity: 0.8;
    }
    .ln.dim {
      opacity: 0.1;
    }
    .ls {
      stroke: #a855f7;
      opacity: 0.3;
    }
    .ls.hl {
      stroke: #a855f7;
      opacity: 0.6;
      stroke-width: 3;
    }
    .ls.dim {
      opacity: 0.05;
    }
    .legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 30px 0;
      padding: 20px;
      background: #1e293b;
      border-radius: 8px;
      border: 1px solid #334155;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }
    .legend-box {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      flex-shrink: 0;
      border: 2px solid;
    }
    .legend-box.mp {
      background: #0ea5e9;
      border-color: #06b6d4;
    }
    .legend-box.rec {
      background: #8b5cf6;
      border-color: #a78bfa;
    }
    .legend-box.sal {
      background: #581c87;
      border-color: #a855f7;
    }
    .legend-box.prod {
      background: #059669;
      border-color: #10b981;
    }
    .legend-box.pkg {
      background: #dc2626;
      border-color: #ef4444;
    }
    .panel {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 350px;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      z-index: 100;
      max-height: 80vh;
      overflow-y: auto;
    }
    .panel.vis {
      display: block;
    }
    .panel h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #f1f5f9;
      word-break: break-word;
    }
    .panel-code {
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
      padding: 8px;
      background: #0f172a;
      border-radius: 4px;
      border-left: 2px solid #475569;
      word-break: break-all;
    }
    .panel-info {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    .panel-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .t-v {
      background: #1e40af;
      color: #bfdbfe;
    }
    .t-a {
      background: #7c2d12;
      color: #fed7aa;
    }
    .t-c {
      background: #0c4a6e;
      color: #bae6fd;
    }
    @media (max-width: 768px) {
      .panel {
        width: calc(100vw - 40px);
        bottom: 10px;
        right: 10px;
      }
      svg {
        max-height: 600px;
      }
    }
    .back{position:fixed;top:15px;left:15px;background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;z-index:99}.back:hover{color:#f1f5f9;border-color:#64748b}
  </style>
</head>
<body>
  <a class="back" href="diagramas.html">&larr; Menú</a>
  <div class="container">
    <div class="header">
      <h1>Arroz Cremoso Tartufato</h1>
      <p class="code">Código: 782 | Familia: All-Included</p>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-box mp"></div>
        <span>Materia Prima</span>
      </div>
      <div class="legend-item">
        <div class="legend-box rec"></div>
        <span>Receta / Caldo</span>
      </div>
      <div class="legend-item">
        <div class="legend-box sal"></div>
        <span>Salsa</span>
      </div>
      <div class="legend-item">
        <div class="legend-box prod"></div>
        <span>Producción</span>
      </div>
      <div class="legend-item">
        <div class="legend-box pkg"></div>
        <span>Empaque</span>
      </div>
    </div>

    <svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa"/>
        </marker>
        <marker id="arrowpurple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L0,6 L9,3 z" fill="#a855f7"/>
        </marker>
      </defs>

      <!-- Preelabs -->
      <!-- Aceite Ajo -->
      <g class="node n-rec" id="aceite-ajo" data-n="Aceite Ajo" data-c="REC-ACEITE-AJO" data-i="Preelaborado:|· Aceite girasol (MP04)|· Ajo (MP40)|Tiempo: 20 min">
        <rect x="50" y="50" width="140" height="80" rx="6" class="glow"/>
        <text x="120" y="85" text-anchor="middle" font-size="13" font-weight="bold">Aceite</text>
        <text x="120" y="105" text-anchor="middle" font-size="13" font-weight="bold">Ajo</text>
      </g>

      <!-- Pesado Risotto -->
      <g class="node n-rec" id="pesado-risotto" data-n="Pesado Risotto" data-c="REC-PESADO-RISOTTO" data-i="Preelaborado:|· Agua 19L|· Pesado 2000g|Tiempo: 15 min">
        <rect x="240" y="50" width="140" height="80" rx="6" class="glow"/>
        <text x="310" y="85" text-anchor="middle" font-size="13" font-weight="bold">Pesado</text>
        <text x="310" y="105" text-anchor="middle" font-size="13" font-weight="bold">Risotto</text>
      </g>

      <!-- Mezcla Jarra Risotto -->
      <g class="node n-rec" id="mezcla-jarra" data-n="Mezcla Jarra Risotto" data-c="REC-MEZCLA-JARRA" data-i="Preelaborado (n-mix):|· Hazelnut (MP09) 60ml|· Agua 3600ml|Tiempo: 10 min">
        <rect x="430" y="50" width="140" height="80" rx="6" class="glow"/>
        <text x="500" y="80" text-anchor="middle" font-size="12" font-weight="bold">Mezcla</text>
        <text x="500" y="97" text-anchor="middle" font-size="12" font-weight="bold">Jarra</text>
        <text x="500" y="114" text-anchor="middle" font-size="12" font-weight="bold">Risotto</text>
      </g>

      <!-- Jarra Risotto -->
      <g class="node n-rec" id="jarra-risotto" data-n="Jarra Risotto" data-c="REC-JARRA-RISOTTO" data-i="Preelaborado:|· Pollo deshid (MP35) 550g|· Puerro deshid (MP36) 510g|· Cebolla deshid (MP34) 815g|Tiempo: 5 min">
        <rect x="620" y="50" width="140" height="80" rx="6" class="glow"/>
        <text x="690" y="80" text-anchor="middle" font-size="12" font-weight="bold">Jarra</text>
        <text x="690" y="97" text-anchor="middle" font-size="12" font-weight="bold">Risotto</text>
        <text x="690" y="114" text-anchor="middle" font-size="12" font-weight="bold">(polvos)</text>
      </g>

      <!-- Caldo Risotto -->
      <g class="node n-rec" id="caldo-risotto" data-n="Caldo Risotto" data-c="REC-CALDO-005 · RIA-RISOTTO" data-i="Composición (23L):|· Agua 19L|· Pesado Risotto 2000g|· Aceite Ajo 1447ml|· Mantequilla (MP13) 800g|· Aceite girasol (MP04) 2500g|· Xantana (MP07) 10.8g|· Umami (MP06) 180g|· Almidón (MP12) 38g|Temperatura: 85°C|Tiempo: 30 min">
        <rect x="810" y="30" width="140" height="120" rx="6" class="glow"/>
        <text x="880" y="70" text-anchor="middle" font-size="13" font-weight="bold">Caldo</text>
        <text x="880" y="90" text-anchor="middle" font-size="13" font-weight="bold">Risotto</text>
        <text x="880" y="110" text-anchor="middle" font-size="11" fill="#bae6fd">(85°C)</text>
      </g>

      <!-- Salsa Tartufata -->
      <g class="node n-sal" id="salsa-tartufata" data-n="Salsa Tartufata" data-c="REC-SALSA-TART" data-i="Salsa elaborada con:|· Agua, Xantana, Umami, Sal|· Boletus seco, Cebolla deshid.|· Manzanilla (MP65) (SULFITOS)|· Nata, Parmesano, Mantequilla (LECHE)|· Girasol trufado (MP67)|· Grasa de pollo (MP66)" data-a="LECHE SULFITOS">
        <rect x="1000" y="50" width="140" height="80" rx="6" class="glow"/>
        <text x="1070" y="85" text-anchor="middle" font-size="13" font-weight="bold">Salsa</text>
        <text x="1070" y="105" text-anchor="middle" font-size="13" font-weight="bold">Tartufata</text>
      </g>

      <!-- Materias Primas -->
      <!-- MP24 Arroz -->
      <g class="node n-mp" id="mp24" data-n="Arroz Maratelli" data-c="MP24 — Arrocera del Pirineo" data-i="Arroz de grano largo|Formato: Sacos 25kg">
        <rect x="50" y="250" width="130" height="70" rx="6" class="glow"/>
        <text x="115" y="280" text-anchor="middle" font-size="12" font-weight="bold">Arroz</text>
        <text x="115" y="300" text-anchor="middle" font-size="11">MP24</text>
      </g>

      <!-- MP23 Tartufata -->
      <g class="node n-mp" id="mp23" data-n="Tartufata - Pasta de Trufa" data-c="MP23 — Solchem" data-i="Pasta de trufa|Ingrediente extra directo a producción|Formato: Botes 1kg">
        <rect x="240" y="250" width="130" height="70" rx="6" class="glow"/>
        <text x="305" y="275" text-anchor="middle" font-size="11" font-weight="bold">Tartufata</text>
        <text x="305" y="295" text-anchor="middle" font-size="11" font-weight="bold">(pasta trufa)</text>
        <text x="305" y="310" text-anchor="middle" font-size="10">MP23</text>
      </g>

      <!-- MP37 Sal -->
      <g class="node n-mp" id="mp37" data-n="Sal" data-c="MP37" data-i="Sal de mesa|Formato: Sacos 25kg">
        <rect x="430" y="250" width="130" height="70" rx="6" class="glow"/>
        <text x="495" y="290" text-anchor="middle" font-size="13" font-weight="bold">Sal</text>
        <text x="495" y="310" text-anchor="middle" font-size="11">MP37</text>
      </g>

      <!-- Agua -->
      <g class="node n-mp" id="agua" data-n="Agua" data-c="Agua" data-i="Agua potable|Temperatura: 20°C">
        <rect x="620" y="250" width="130" height="70" rx="6" class="glow"/>
        <text x="685" y="290" text-anchor="middle" font-size="13" font-weight="bold">Agua</text>
      </g>

      <!-- Producción -->
      <g class="node n-prod" id="prod" data-n="Producción - Mezcla" data-c="PROD-782" data-i="Lote: L-782-AAMMDD|En producción se mezcla:|· Arroz Maratelli (MP24)|· Agua (en mezcla jarra)|· Caldo Risotto|· Salsa Tartufata|· Mezcla Jarra Risotto (líquido)|· Jarra Risotto (polvos)|· Sal (MP37)|· Tartufata (MP23, pasta trufa, extra)|Temperatura: 85°C|Tiempo: 25 min">
        <rect x="400" y="400" width="150" height="100" rx="6" class="glow"/>
        <text x="475" y="435" text-anchor="middle" font-size="14" font-weight="bold">Producción</text>
        <text x="475" y="455" text-anchor="middle" font-size="13" font-weight="bold">Mezcla</text>
        <text x="475" y="475" text-anchor="middle" font-size="11" fill="#d1fae5">(85°C)</text>
      </g>

      <!-- Empaque -->
      <g class="node n-pkg" id="pkg" data-n="Empaque" data-c="PKG-782" data-i="Formato: 300g All-Included|Presentación: 24 uds/caja|Bandeja: EOS-35 (MP50)|Film: Adrados (MP51)|Etiqueta: Cremoso Tartufato">
        <rect x="650" y="400" width="150" height="100" rx="6" class="glow"/>
        <text x="725" y="445" text-anchor="middle" font-size="14" font-weight="bold">Empaque</text>
        <text x="725" y="465" text-anchor="middle" font-size="11" fill="#fee2e2">300g All-Included</text>
      </g>

      <!-- Líneas de conexión - Preelabs a Caldo -->
      <line class="ln" id="ln-aceite-caldo" data-f="aceite-ajo" data-t="caldo-risotto" x1="190" y1="90" x2="810" y2="90" marker-end="url(#arrowblue)"/>
      <line class="ln" id="ln-pesado-caldo" data-f="pesado-risotto" data-t="caldo-risotto" x1="380" y1="90" x2="810" y2="90" marker-end="url(#arrowblue)"/>

      <!-- Líneas de conexión - Ingredientes a Mezcla -->
      <line class="ln" id="ln-arroz-prod" data-f="mp24" data-t="prod" x1="115" y1="320" x2="425" y2="400" marker-end="url(#arrowblue)"/>
      <line class="ln" id="ln-tartufata-prod" data-f="mp23" data-t="prod" x1="305" y1="320" x2="450" y2="400" marker-end="url(#arrowblue)"/>
      <line class="ln" id="ln-sal-prod" data-f="mp37" data-t="prod" x1="495" y1="320" x2="475" y2="400" marker-end="url(#arrowblue)"/>
      <line class="ln" id="ln-agua-prod" data-f="agua" data-t="prod" x1="685" y1="320" x2="520" y2="400" marker-end="url(#arrowblue)"/>

      <!-- Líneas de conexión - Caldo y Salsa (principales) -->
      <line class="ln" id="ln-caldo-prod" data-f="caldo-risotto" data-t="prod" x1="880" y1="150" x2="520" y2="400" marker-end="url(#arrowblue)"/>
      <line class="ls" id="ln-salsa-prod" data-f="salsa-tartufata" data-t="prod" x1="1000" y1="90" x2="550" y2="400" marker-end="url(#arrowpurple)"/>

      <!-- Líneas de conexión - Preelabs a Producción -->
      <line class="ln" id="ln-mezcla-prod" data-f="mezcla-jarra" data-t="prod" x1="500" y1="130" x2="475" y2="400" marker-end="url(#arrowblue)"/>
      <line class="ln" id="ln-jarra-prod" data-f="jarra-risotto" data-t="prod" x1="690" y1="130" x2="500" y2="400" marker-end="url(#arrowblue)"/>

      <!-- Línea de conexión - Producción a Empaque -->
      <line class="ln" id="ln-prod-pkg" data-f="prod" data-t="pkg" x1="550" y1="450" x2="650" y2="450" marker-end="url(#arrowblue)"/>

      <!-- Alérgenos destacados -->
      <text x="480" y="600" font-size="16" font-weight="bold" fill="#fecaca">⚠ Alérgenos: LECHE · SULFITOS</text>
    </svg>
  </div>

  <!-- Panel de información -->
  <div class="panel" id="P">
    <h3 id="pN"></h3>
    <div class="panel-code" id="pC"></div>
    <div class="panel-info" id="pI"></div>
    <div class="panel-tags" id="pT"></div>
  </div>

  <script>
    const ns=document.querySelectorAll('.node[id]:not([style*="display:none"])'),ls=document.querySelectorAll('.ln'),P=document.getElementById('P');
    let sel=null;
    ns.forEach(n=>{n.addEventListener('click',e=>{e.stopPropagation();const id=n.id;if(sel===id){clr();return}sel=id;
    const c=new Set([id]);ls.forEach(l=>{if(l.dataset.f===id||l.dataset.t===id){c.add(l.dataset.f);c.add(l.dataset.t)}});
    ns.forEach(x=>{x.classList.toggle('hl',c.has(x.id));x.classList.toggle('dim',!c.has(x.id))});
    ls.forEach(l=>{const ok=l.dataset.f===id||l.dataset.t===id;l.classList.toggle('hl',ok);l.classList.toggle('dim',!ok)});
    document.getElementById('pN').textContent=n.dataset.n;document.getElementById('pC').textContent=n.dataset.c;
    document.getElementById('pI').innerHTML=n.dataset.i.split('|').join('<br>');
    let t='';if(n.dataset.v)t+=`<span class="tag t-v">⏱ ${n.dataset.v}</span> `;
    if(n.dataset.a)t+=`<span class="tag t-a">⚠ ${n.dataset.a}</span> `;
    if(n.dataset.s)t+=`<span class="tag t-c">❄ ${n.dataset.s}</span> `;
    document.getElementById('pT').innerHTML=t;P.classList.add('vis')})});
    document.addEventListener('click',clr);
    function clr(){sel=null;ns.forEach(n=>{n.classList.remove('hl','dim')});ls.forEach(l=>{l.classList.remove('hl','dim')});P.classList.remove('vis')}
  </script>
</body>
</html>
