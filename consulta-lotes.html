<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIA — Gestión de Lotes MP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --green: #1B5E20;
            --light-green: #4CAF50;
            --pale-green: #E8F5E9;
            --red: #D32F2F;
            --orange: #F57C00;
            --gray: #F5F5F5;
            --border: #E0E0E0;
            --text: #212121;
            --text-light: #757575;
        }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAFAFA; color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--green); color: white;
            padding: 14px 16px; text-align: center;
            position: sticky; top: 0; z-index: 10;
        }
        .header h1 { font-size: 18px; font-weight: 700; }
        .header small { opacity: 0.8; font-size: 11px; }
        .container { padding: 12px; max-width: 600px; margin: 0 auto; }

        /* ===== SEARCH ===== */
        .search-area {
            position: sticky; top: 52px; z-index: 9;
            background: #FAFAFA; padding: 10px 0 8px;
        }
        .search-wrapper { position: relative; }
        .search-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            font-size: 20px; color: var(--text-light); pointer-events: none;
        }
        .search-input {
            width: 100%; padding: 14px 16px 14px 44px; font-size: 17px;
            border: 2px solid var(--border); border-radius: 14px;
            outline: none; background: white;
            transition: border 0.2s;
        }
        .search-input:focus { border-color: var(--green); }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex; gap: 8px; margin: 8px 0 4px;
            font-size: 12px; color: var(--text-light);
            align-items: center; justify-content: space-between;
        }
        .stats-bar .count { font-weight: 700; color: var(--green); }
        .btn-small {
            background: var(--pale-green); color: var(--green); border: none;
            padding: 5px 12px; border-radius: 6px; font-size: 12px;
            font-weight: 600; cursor: pointer;
        }
        .btn-small:active { opacity: 0.7; }
        .btn-small:disabled { opacity: 0.4; }

        /* ===== FILTER TABS ===== */
        .filter-tabs {
            display: flex; gap: 6px; overflow-x: auto; padding: 8px 0;
            -webkit-overflow-scrolling: touch;
        }
        .filter-tab {
            padding: 6px 14px; border-radius: 20px; font-size: 13px;
            font-weight: 600; border: 1px solid var(--border);
            background: white; color: var(--text-light); cursor: pointer;
            white-space: nowrap; flex-shrink: 0;
        }
        .filter-tab:active { opacity: 0.7; }
        .filter-tab.active { background: var(--green); color: white; border-color: var(--green); }

        /* ===== LOT CARDS ===== */
        .lot-card {
            background: white; border-radius: 12px; padding: 14px;
            margin-bottom: 8px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .lot-card.expired { border-left: 4px solid var(--red); opacity: 0.6; }
        .lot-card.warning { border-left: 4px solid var(--orange); }
        .lot-card.ok { border-left: 4px solid var(--light-green); }
        .lot-info { flex: 1; min-width: 0; }
        .lot-code-label { font-size: 11px; color: var(--text-light); font-weight: 600; text-transform: uppercase; }
        .lot-product { font-size: 15px; font-weight: 700; margin: 2px 0; }
        .lot-details { font-size: 13px; color: var(--text-light); }
        .lot-details span { margin-right: 10px; }
        .lot-expiry { font-size: 12px; margin-top: 3px; font-weight: 600; }
        .lot-expiry.ok { color: var(--light-green); }
        .lot-expiry.warning { color: var(--orange); }
        .lot-expiry.expired { color: var(--red); }
        .btn-copy {
            background: var(--green); color: white; border: none;
            padding: 8px 14px; border-radius: 8px; font-size: 13px;
            font-weight: 600; cursor: pointer; white-space: nowrap;
            margin-left: 10px; flex-shrink: 0;
        }
        .btn-copy:active { opacity: 0.7; }
        .btn-copy.copied { background: var(--light-green); }

        /* ===== EMPTY STATE ===== */
        .empty { text-align: center; padding: 40px 20px; color: var(--text-light); }
        .empty .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        .loading { text-align: center; padding: 40px 20px; color: var(--text-light); }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 10px;
            font-size: 14px; font-weight: 600; z-index: 100;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        .footer {
            text-align: center; padding: 20px; font-size: 11px;
            color: var(--text-light); margin-top: 20px;
        }
        .back-link {
            display: inline-block; margin-bottom: 12px; color: var(--green);
            text-decoration: none; font-size: 14px; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Gestión de Lotes MP</h1>
    <small>Materia prima activa · Rice in Action</small>
</div>

<div class="container">
    <a class="back-link" id="backLink" href="#">&larr; Volver al Hub</a>

    <!-- Search -->
    <div class="search-area">
        <div class="search-wrapper">
            <span class="search-icon">&#128269;</span>
            <input type="text" class="search-input" id="searchInput"
                   placeholder="Buscar por producto, código o proveedor..."
                   oninput="renderLots()" autofocus>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
        <span><span class="count" id="lotCount">—</span> lotes activos</span>
        <button class="btn-small" onclick="loadLots()" id="syncBtn">Actualizar</button>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" onclick="setFilter('todos')">Todos</button>
        <button class="filter-tab" onclick="setFilter('ingrediente')">Ingredientes</button>
        <button class="filter-tab" onclick="setFilter('arroz')">Arroces</button>
        <button class="filter-tab" onclick="setFilter('envase')">Envases</button>
        <button class="filter-tab" onclick="setFilter('caducidad')">Prox. caducar</button>
    </div>

    <!-- Lot listing -->
    <div id="lotListing">
        <div class="loading">Cargando lotes...</div>
    </div>
</div>

<div class="footer">
    Rice in Action &mdash; Quality Hub v2.0<br>
    <span id="lastSync"></span>
</div>

<div class="toast" id="toast"></div>

<script src="ria-backend-v2.js"></script>
<script>
// ============================================================
// STATE
// ============================================================
let allLots = [];
let currentFilter = 'todos';
const TOKEN = new URLSearchParams(window.location.search).get('token') || '';

// Back link
document.getElementById('backLink').href = 'app_cristina.html?token=' + TOKEN;

// ============================================================
// LOAD LOTS FROM BACKEND
// ============================================================
async function loadLots() {
    const btn = document.getElementById('syncBtn');
    btn.textContent = 'Cargando...';
    btn.disabled = true;

    try {
        const data = await RIA.get('lotes_activos');
        if (data && data.lotes) {
            allLots = data.lotes.map(l => ({
                codigo: l.codigo_mp || '',
                producto: l.producto || '',
                lote: l.lote || '',
                proveedor: l.proveedor || '',
                caducidad: parseFecha(l.caducidad),
                caducidadRaw: l.caducidad || '',
                cantidad: l.cantidad || '',
                fechaRecepcion: l.fecha_recepcion || ''
            }));
            // Sort by code
            allLots.sort((a, b) => a.codigo.localeCompare(b.codigo, 'es', { numeric: true }));
            document.getElementById('lastSync').textContent = 'Actualizado: ' + new Date().toLocaleString('es-ES');
        }
    } catch (err) {
        console.error('Error cargando lotes:', err);
        document.getElementById('lotListing').innerHTML =
            '<div class="empty"><div class="icon">⚠️</div><p>Error al cargar lotes.<br>Comprueba tu conexión.</p></div>';
    }

    btn.textContent = 'Actualizar';
    btn.disabled = false;
    renderLots();
}

// ============================================================
// PARSE FECHA (handles various formats from Sheets)
// ============================================================
function parseFecha(val) {
    if (!val) return null;
    const s = String(val);
    // ISO format from Sheets Date object: "2026-06-15T..."
    if (s.includes('T')) {
        return new Date(s);
    }
    // dd/mm/yyyy
    const parts = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (parts) {
        return new Date(parseInt(parts[3]), parseInt(parts[2]) - 1, parseInt(parts[1]));
    }
    // mm/yyyy
    const monthYear = s.match(/^(\d{1,2})\/(\d{4})$/);
    if (monthYear) {
        return new Date(parseInt(monthYear[2]), parseInt(monthYear[1]) - 1, 28); // last-ish day of month
    }
    // yyyy-mm-dd
    const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (iso) {
        return new Date(parseInt(iso[1]), parseInt(iso[2]) - 1, parseInt(iso[3]));
    }
    return null;
}

// ============================================================
// EXPIRY STATUS
// ============================================================
function getExpiryStatus(date) {
    if (!date) return { cls: '', text: 'Sin caducidad', days: Infinity };
    const now = new Date();
    const diff = Math.ceil((date - now) / 86400000);
    if (diff < 0) return { cls: 'expired', text: `Caducado hace ${Math.abs(diff)}d`, days: diff };
    if (diff <= 30) return { cls: 'warning', text: `Caduca en ${diff}d`, days: diff };
    if (diff <= 90) return { cls: 'warning', text: `Caduca en ${diff}d`, days: diff };
    return { cls: 'ok', text: `Caduca en ${diff}d`, days: diff };
}

// ============================================================
// CLASSIFY LOT TYPE
// ============================================================
function getLotType(codigo) {
    const c = (codigo || '').toUpperCase();
    if (c.startsWith('MP5') || c.startsWith('MP6') && c.length <= 4) return 'envase'; // MP50, MP51, MP55
    if (/^MP2[4-9]$|^MP2[0-3]$/.test(c)) {
        // Check if it's arroz
        if (c === 'MP24' || c === 'MP25' || c === 'MP26') return 'arroz';
    }
    return 'ingrediente';
}

function getLotTypeByName(producto) {
    const p = (producto || '').toLowerCase();
    if (p.includes('arroz') || p.includes('maratelli') || p.includes('bahía') || p.includes('marisma') || p.includes('bomba')) return 'arroz';
    if (p.includes('bandeja') || p.includes('film') || p.includes('envase') || p.includes('tapa') || p.includes('estuche')) return 'envase';
    return 'ingrediente';
}

// ============================================================
// FILTER
// ============================================================
function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderLots();
}

// ============================================================
// RENDER
// ============================================================
function renderLots() {
    const search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    const listing = document.getElementById('lotListing');

    let filtered = allLots.filter(l => {
        // Search filter
        if (search) {
            const haystack = `${l.codigo} ${l.producto} ${l.proveedor} ${l.lote}`.toLowerCase();
            const words = search.split(/\s+/);
            if (!words.every(w => haystack.includes(w))) return false;
        }
        // Type filter
        if (currentFilter === 'todos') return true;
        if (currentFilter === 'caducidad') {
            const exp = getExpiryStatus(l.caducidad);
            return exp.days <= 90 && exp.days !== Infinity;
        }
        const type = getLotTypeByName(l.producto);
        return type === currentFilter;
    });

    // Sort: caducidad filter sorts by expiry
    if (currentFilter === 'caducidad') {
        filtered.sort((a, b) => {
            const da = a.caducidad ? a.caducidad.getTime() : Infinity;
            const db = b.caducidad ? b.caducidad.getTime() : Infinity;
            return da - db;
        });
    }

    document.getElementById('lotCount').textContent = filtered.length;

    if (filtered.length === 0) {
        listing.innerHTML = '<div class="empty"><div class="icon">📦</div><p>No hay lotes que coincidan.</p></div>';
        return;
    }

    listing.innerHTML = filtered.map(l => {
        const exp = getExpiryStatus(l.caducidad);
        const cadText = l.caducidad ? l.caducidad.toLocaleDateString('es-ES') : (l.caducidadRaw || '—');
        return `
        <div class="lot-card ${exp.cls}">
            <div class="lot-info">
                <div class="lot-code-label">${l.codigo}</div>
                <div class="lot-product">${l.producto}</div>
                <div class="lot-details">
                    <span>Lote: <strong>${l.lote}</strong></span>
                    <span>${l.proveedor}</span>
                </div>
                <div class="lot-expiry ${exp.cls}">${cadText} · ${exp.text}</div>
            </div>
            <button class="btn-copy" onclick="copyLot('${l.lote}', this)">Copiar</button>
        </div>`;
    }).join('');
}

// ============================================================
// COPY LOT
// ============================================================
function copyLot(lot, btn) {
    navigator.clipboard.writeText(lot).then(() => {
        btn.textContent = '✓';
        btn.classList.add('copied');
        showToast('Lote copiado: ' + lot);
        setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1500);
    });
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// INIT
// ============================================================
if (!TOKEN) {
    document.querySelector('.container').innerHTML =
        '<div class="empty"><div class="icon">🔒</div><p>Acceso restringido.<br>Usa el enlace del Quality Hub.</p></div>';
} else {
    loadLots();
}
</script>
</body>
</html>
