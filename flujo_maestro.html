<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flujo de Producción — Familia Maestro | APPCC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            position: relative;
            margin-bottom: 50px;
            padding-bottom: 30px;
            border-bottom: 1px solid #334155;
        }

        .back {
            position: absolute;
            top: 0;
            left: 0;
            color: #93c5fd;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.2s;
        }

        .back:hover {
            color: #60a5fa;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .sub {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .legend-square {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            border: 2px solid;
        }

        .legend-square.op {
            background-color: #1e3a5f;
            border-color: #3b82f6;
        }

        .legend-square.pcc {
            background-color: #4c1d1d;
            border-color: #ef4444;
        }

        .legend-square.start {
            background-color: #14532d;
            border-color: #22c55e;
        }

        .legend-square.end {
            background-color: #78350f;
            border-color: #f59e0b;
        }

        .content {
            display: flex;
            gap: 40px;
            position: relative;
        }

        .graph-wrapper {
            flex: 1;
            position: relative;
        }

        .graph {
            position: relative;
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 40px;
            height: 1100px;
            margin: 0 auto;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .nodes-container {
            position: relative;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .node {
            position: absolute;
            width: 220px;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid;
            transition: all 0.2s ease;
            text-align: center;
            z-index: 10;
            left: 50%;
            transform: translateX(-50%);
        }

        .node:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .node-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .node-type {
            font-size: 11px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .n-op {
            background-color: #1e3a5f;
            border-color: #3b82f6;
            color: #93c5fd;
        }

        .n-pcc {
            background-color: #4c1d1d;
            border-color: #ef4444;
            color: #fca5a5;
            font-weight: bold;
        }

        .n-start {
            background-color: #14532d;
            border-color: #22c55e;
            color: #86efac;
        }

        .n-end {
            background-color: #78350f;
            border-color: #f59e0b;
            color: #fde68a;
        }

        .side-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 350px;
            height: 100vh;
            background-color: #1e293b;
            border-left: 1px solid #334155;
            padding: 30px;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .side-panel.open {
            transform: translateX(0);
        }

        .panel-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .panel-close:hover {
            color: #e2e8f0;
        }

        .panel-content {
            margin-top: 40px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #f1f5f9;
        }

        .panel-section {
            margin-bottom: 20px;
        }

        .panel-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .panel-value {
            font-size: 14px;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .panel-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .panel-type.op {
            background-color: #1e3a5f;
            color: #93c5fd;
            border: 1px solid #3b82f6;
        }

        .panel-type.pcc {
            background-color: #4c1d1d;
            color: #fca5a5;
            border: 1px solid #ef4444;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        .overlay.open {
            display: block;
        }

        svg line {
            stroke: #475569;
            stroke-width: 2;
        }

        svg path {
            stroke: #475569;
            stroke-width: 2;
            fill: none;
        }

        svg polygon {
            fill: #475569;
        }

        @media (max-width: 1024px) {
            .side-panel {
                width: 300px;
            }
        }

        @media (max-width: 768px) {
            .side-panel {
                width: 100%;
            }

            h1 {
                font-size: 24px;
            }

            .graph {
                height: auto;
                min-height: 1100px;
            }
        }
    </style>
</head>
<body>
<script>

  var t=new URLSearchParams(window.location.search).get('token')||'';
  if(!t.startsWith('ria_cristina_')&&!t.startsWith('ria_pablo_')&&!t.startsWith('ria_christophe_')){

</script>

    <div class="container">
        <div class="header">
            <a class="back" href="diagramas.html">&larr; Menú</a>
            <h1>Flujo de Producción — Familia Maestro</h1>
            <div class="sub">Diagrama de proceso APPCC · Rice in Action S.L.</div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-square op"></div>
                <span>Operación</span>
            </div>
            <div class="legend-item">
                <div class="legend-square pcc"></div>
                <span>PCC (Punto Crítico de Control)</span>
            </div>
            <div class="legend-item">
                <div class="legend-square start"></div>
                <span>Inicio</span>
            </div>
            <div class="legend-item">
                <div class="legend-square end"></div>
                <span>Final</span>
            </div>
        </div>

        <div class="content">
            <div class="graph-wrapper">
                <div class="graph">
                    <svg id="svg-arrows"></svg>
                    <div class="nodes-container" id="nodes-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="side-panel" id="side-panel">
        <button class="panel-close" id="panel-close">&times;</button>
        <div class="panel-content" id="panel-content"></div>
    </div>

    <script>
        const nodes = [
            {
                id: 1,
                name: "Arroz en redes",
                type: "start",
                typeLabel: "Operación",
                desc: "El arroz se pesa y se introduce en redes de cocción",
                info: "Cantidad según formato (190g-1330g)"
            },
            {
                id: 2,
                name: "Preparar jarras",
                type: "op",
                typeLabel: "Operación",
                desc: "Se preparan las jarras con la mezcla de ingredientes secos",
                info: "Mezcla Jarra Maestro (líquido)"
            },
            {
                id: 3,
                name: "Horno — cocción alta temperatura",
                type: "op",
                typeLabel: "Operación",
                desc: "Cocción a alta temperatura",
                info: "Arroz en red + jarra + agua | Temperatura y tiempo según programa"
            },
            {
                id: 4,
                name: "Añadir aceite",
                type: "op",
                typeLabel: "Operación",
                desc: "Se añade aceite preelaborado (Aceite de Ajo)",
                info: "Directamente sobre el arroz cocido"
            },
            {
                id: 5,
                name: "Dispensar en barquetas",
                type: "op",
                typeLabel: "Operación",
                desc: "Dosificación en bandejas EOS-35",
                info: "Control de peso por unidad"
            },
            {
                id: 6,
                name: "Termosellado",
                type: "op",
                typeLabel: "Operación",
                desc: "Sellado con film top-seal",
                info: "Control de hermeticidad"
            },
            {
                id: 7,
                name: "Etiquetado",
                type: "op",
                typeLabel: "Operación",
                desc: "Impresión y colocación de etiqueta",
                info: "Lote, fecha caducidad, código producto"
            },
            {
                id: 8,
                name: "Detector de metales",
                type: "pcc",
                typeLabel: "PCC2",
                desc: "Detector de metales",
                info: "Límite crítico: Fe ≤ 1.5mm, No-Fe ≤ 2.0mm, SS ≤ 2.5mm | Monitorización: cada bandeja | Acción correctiva: rechazo automático + revisión lote"
            },
            {
                id: 9,
                name: "Pasteurización",
                type: "pcc",
                typeLabel: "PCC1",
                desc: "Pasteurización",
                info: "Límite crítico: Tª ≥ 85°C, t ≥ 45 min | Monitorización: registro continuo de Tª | Acción correctiva: reproceso o destrucción"
            },
            {
                id: 10,
                name: "Abatimiento",
                type: "op",
                typeLabel: "Operación",
                desc: "Reducción rápida de temperatura",
                info: "Objetivo: < 10°C en < 2 horas"
            },
            {
                id: 11,
                name: "Refrigeración",
                type: "op",
                typeLabel: "Operación",
                desc: "Almacenamiento refrigerado",
                info: "Tª ≤ 4°C"
            },
            {
                id: 12,
                name: "Embalaje en cajas",
                type: "end",
                typeLabel: "Operación",
                desc: "Embalaje en cajas según formato",
                info: "24 uds/caja (190g), 20 uds/caja (380g) | Almacenamiento en cámara refrigerada"
            }
        ];

        const nodeHeight = 100;
        const nodeSpacing = 65;
        const startY = 40;

        function initNodes() {
            const container = document.getElementById('nodes-container');

            nodes.forEach((node, idx) => {
                const y = startY + idx * nodeSpacing;

                const nodeEl = document.createElement('div');
                nodeEl.className = `node n-${node.type}`;
                nodeEl.style.top = y + 'px';
                nodeEl.setAttribute('data-id', node.id);

                nodeEl.innerHTML = `
                    <div class="node-title">${node.name}</div>
                    <div class="node-type">${node.typeLabel}</div>
                `;

                nodeEl.addEventListener('click', () => openPanel(node));
                container.appendChild(nodeEl);
            });
        }

        function drawArrows() {
            const svg = document.getElementById('svg-arrows');
            const graphWidth = document.querySelector('.graph').offsetWidth;
            const centerX = graphWidth / 2;

            nodes.forEach((node, idx) => {
                if (idx < nodes.length - 1) {
                    const y1 = startY + 20 + idx * nodeSpacing;
                    const y2 = startY + idx * nodeSpacing + nodeSpacing;

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', centerX);
                    line.setAttribute('y1', y1);
                    line.setAttribute('x2', centerX);
                    line.setAttribute('y2', y2);
                    svg.appendChild(line);

                    // Arrowhead
                    const arrowSize = 8;
                    const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    polygon.setAttribute('points', `${centerX},${y2} ${centerX - arrowSize/2},${y2 - arrowSize} ${centerX + arrowSize/2},${y2 - arrowSize}`);
                    svg.appendChild(polygon);
                }
            });
        }

        function openPanel(node) {
            const panel = document.getElementById('side-panel');
            const overlay = document.getElementById('overlay');
            const content = document.getElementById('panel-content');

            let panelHTML = `
                <h2 class="panel-title">${node.name}</h2>
                <div class="panel-type ${node.type}">${node.typeLabel}</div>
            `;

            panelHTML += `
                <div class="panel-section">
                    <div class="panel-label">Descripción</div>
                    <div class="panel-value">${node.desc}</div>
                </div>
            `;

            if (node.type === 'pcc') {
                const infoParts = node.info.split(' | ');
                panelHTML += `
                    <div class="panel-section">
                        <div class="panel-label">Límite Crítico</div>
                        <div class="panel-value">${infoParts[0]}</div>
                    </div>
                    <div class="panel-section">
                        <div class="panel-label">Monitorización</div>
                        <div class="panel-value">${infoParts[1] || ''}</div>
                    </div>
                    <div class="panel-section">
                        <div class="panel-label">Acción Correctiva</div>
                        <div class="panel-value">${infoParts[2] || ''}</div>
                    </div>
                `;
            } else {
                panelHTML += `
                    <div class="panel-section">
                        <div class="panel-label">Detalles</div>
                        <div class="panel-value">${node.info}</div>
                    </div>
                `;
            }

            content.innerHTML = panelHTML;
            panel.classList.add('open');
            overlay.classList.add('open');
        }

        function closePanel() {
            const panel = document.getElementById('side-panel');
            const overlay = document.getElementById('overlay');
            panel.classList.remove('open');
            overlay.classList.remove('open');
        }

        document.getElementById('panel-close').addEventListener('click', closePanel);
        document.getElementById('overlay').addEventListener('click', closePanel);

        document.addEventListener('DOMContentLoaded', () => {
            initNodes();
            setTimeout(drawArrows, 100);
        });

        window.addEventListener('resize', () => {
            const svg = document.getElementById('svg-arrows');
            svg.innerHTML = '';
            drawArrows();
        });
    </script>
</body>
</html>
